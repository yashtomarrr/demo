<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Image Tracking</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      .hint {
        position: fixed;
        z-index: 10;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 14px;
      }

      .brand {
        position: fixed;
        z-index: 45;
        top: 16px;
        right: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.55);
        color: #9fe8ff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.4px;
      }

      .start-wrap {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
      }

      .start-btn {
        border: 0;
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        position: fixed;
        z-index: 30;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(180, 0, 0, 0.8);
        color: #fff;
        font-size: 13px;
        display: none;
      }

      .debuglog {
        position: fixed;
        z-index: 40;
        left: 12px;
        right: 12px;
        top: 60px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #d9f7ff;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre-line;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status"></div>
    <div class="brand">Made by WEXR</div>
    <div id="debugLog" class="debuglog">Debug:\nWaiting to start...</div>
    <div id="startWrap" class="start-wrap">
      <button id="startBtn" class="start-btn">Start AR Camera</button>
    </div>
    <div class="hint">Point your camera at the target image</div>

    <a-scene
      id="scene"
      mindar-image="imageTargetSrc: ./targets.mind?v=5; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
        <a-plane
          id="debugPlane"
          position="0 0 0"
          rotation="0 0 0"
          width="1"
          height="1"
          color="#00ffff"
          opacity="0.18"
        ></a-plane>

        <a-entity id="modelAnchor" position="0 0 0.02" rotation="0 0 0">
          <a-box
            id="debugBox"
            position="0 0 0"
            depth="0.08"
            height="0.08"
            width="0.08"
            color="#ff2d55"
            visible="false"
          ></a-box>

          <a-box
            id="fallbackModel"
            position="0 0 0.08"
            depth="0.22"
            height="0.22"
            width="0.22"
            color="#22cc88"
            visible="false"
          ></a-box>

          <a-entity
            id="avatar"
            gltf-model="url(./car.glb)"
            position="0 0 0.08"
            rotation="0 0 0"
            scale="1 1 1"
            visible="false"
          ></a-entity>
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>
    </a-scene>

    <script>
      const scene = document.querySelector("#scene");
      const startBtn = document.querySelector("#startBtn");
      const startWrap = document.querySelector("#startWrap");
      const status = document.querySelector("#status");
      const debugLog = document.querySelector("#debugLog");
      const target = document.querySelector("#targetEntity");
      const avatar = document.querySelector("#avatar");
      const debugBox = document.querySelector("#debugBox");
      const debugPlane = document.querySelector("#debugPlane");
      const fallbackModel = document.querySelector("#fallbackModel");
      const ua = navigator.userAgent || "";
      const MODEL_URL = `./car.glb?v=${Date.now()}`;

      const TARGET_WIDTH = 1.0;
      const TARGET_HEIGHT = 1.0;
      const COVERAGE = 0.95;
      const MIN_SCALE = 0.2;
      const MAX_SCALE = 20.0;

      let isTargetVisible = false;
      let isModelReady = false;
      let modelLoadWatchdog = null;

      const showStatus = (message) => {
        status.textContent = message;
        status.style.display = "block";
      };

      const hideStatusSoon = () => {
        window.setTimeout(() => {
          status.style.display = "none";
        }, 1800);
      };

      const appendLog = (message) => {
        const now = new Date().toLocaleTimeString();
        const prev = debugLog.textContent.split("\n").slice(0, 10).join("\n");
        debugLog.textContent = `Debug:\n[${now}] ${message}\n${prev}`;
      };

      const patchVideoForIOS = () => {
        const video = document.querySelector("video");
        if (!video) return;
        video.setAttribute("playsinline", "true");
        video.setAttribute("webkit-playsinline", "true");
        video.muted = true;
      };

      const requestCameraPermission = async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Camera API not supported in this browser.");
        }
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
          });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
        stream.getTracks().forEach((track) => track.stop());
      };

      // Force fresh GLB fetch each page load to avoid stale CDN/browser cache.
      avatar.setAttribute("gltf-model", `url(${MODEL_URL})`);
      appendLog(`Using model: ${MODEL_URL}`);

      const isInAppBrowser = () => /WhatsApp|FBAN|FBAV|Instagram|Line|wv/i.test(ua);

      const forceOpaqueMaterials = () => {
        const meshRoot = avatar.getObject3D("mesh");
        if (!meshRoot) return;
        meshRoot.traverse((node) => {
          if (!node.isMesh || !node.material) return;
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach((mat) => {
            mat.transparent = false;
            mat.opacity = 1;
            mat.depthWrite = true;
            mat.depthTest = false;
            mat.alphaTest = 0;
            mat.needsUpdate = true;
          });
          node.frustumCulled = false;
        });
      };

      const fitModelToTarget = () => {
        const meshRoot = avatar.getObject3D("mesh");
        if (!meshRoot || !window.THREE) return false;

        const box = new THREE.Box3().setFromObject(meshRoot);
        if (box.isEmpty()) return false;

        const size = new THREE.Vector3();
        box.getSize(size);
        if (size.x <= 0 || size.y <= 0 || size.z <= 0) return false;

        let fitScale = Math.min((TARGET_WIDTH * COVERAGE) / size.x, (TARGET_HEIGHT * COVERAGE) / size.z);
        fitScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, fitScale));

        avatar.object3D.scale.setScalar(fitScale);
        // Recenter model by bounds so pivot issues in imported GLB don't hide it.
        const recenteredBox = new THREE.Box3().setFromObject(meshRoot);
        const center = new THREE.Vector3();
        recenteredBox.getCenter(center);
        const zLift = 0.02 - recenteredBox.min.z;
        avatar.object3D.position.set(-center.x, -center.y, zLift);
        avatar.object3D.visible = true;
        return true;
      };

      const fitModelWithRetry = (attempts = 30) => {
        let remaining = attempts;
        const run = () => {
          const ok = fitModelToTarget();
          if (ok) return;
          remaining -= 1;
          if (remaining > 0) window.requestAnimationFrame(run);
        };
        run();
      };

      startBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            showStatus("Mobile camera requires HTTPS (or localhost).");
            appendLog("Blocked: insecure context");
            return;
          }
          if (isInAppBrowser()) {
            showStatus("Open this link in Safari/Chrome. In-app browsers may block camera.");
            appendLog("Blocked: in-app browser");
            return;
          }

          await requestCameraPermission();
          await scene.systems["mindar-image-system"].start();
          patchVideoForIOS();
          appendLog("Loading GLB...");
          modelLoadWatchdog = window.setTimeout(() => {
            if (!isModelReady) {
              appendLog("GLB timeout: showing fallback cube");
              showStatus("Model load delayed. Showing fallback object.");
            }
          }, 5000);

          startWrap.style.display = "none";
          showStatus("Camera started. Scan the exact target image.");
          appendLog("Camera started");
          hideStatusSoon();
        } catch (err) {
          const msg = String(err && err.message ? err.message : err);
          showStatus("Camera start failed. Open in Safari/Chrome, use HTTPS, and allow camera.");
          appendLog(`Camera error: ${msg}`);
          console.error(err);
        }
      });

      target.addEventListener("targetFound", () => {
        isTargetVisible = true;
        appendLog("Target found");
        showStatus("Target found");

        if (isModelReady) {
          avatar.setAttribute("visible", "true");
          fallbackModel.setAttribute("visible", "true");
          debugBox.setAttribute("visible", "false");
          fitModelWithRetry();
        } else {
          fallbackModel.setAttribute("visible", "true");
          debugBox.setAttribute("visible", "true");
          appendLog("GLB not ready yet, showing fallback cube");
        }
      });

      target.addEventListener("targetLost", () => {
        isTargetVisible = false;
        appendLog("Target lost");
        showStatus("Target lost. Keep full image in frame.");
        avatar.setAttribute("visible", "false");
        fallbackModel.setAttribute("visible", "false");
        debugBox.setAttribute("visible", "false");
      });

      avatar.addEventListener("model-loaded", () => {
        isModelReady = true;
        if (modelLoadWatchdog) window.clearTimeout(modelLoadWatchdog);
        appendLog("GLB model-loaded");

        forceOpaqueMaterials();
        fitModelWithRetry();

        if (isTargetVisible) {
          avatar.setAttribute("visible", "true");
          fallbackModel.setAttribute("visible", "false");
          debugBox.setAttribute("visible", "false");
        }

        debugPlane.setAttribute("opacity", "0.08");
        showStatus("3D model loaded");
        hideStatusSoon();
      });

      avatar.addEventListener("model-error", () => {
        isModelReady = false;
        appendLog("GLB model-error (check car.glb URL)");
        avatar.setAttribute("visible", "false");
        if (isTargetVisible) fallbackModel.setAttribute("visible", "true");
        debugBox.setAttribute("visible", "true");
        showStatus("Model failed to load. Verify /car.glb is accessible.");
      });
    </script>
  </body>
</html>
