<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Image Tracking</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      .hint {
        position: fixed;
        z-index: 10;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 14px;
      }

      .start-wrap {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
      }

      .start-btn {
        border: 0;
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        position: fixed;
        z-index: 30;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(180, 0, 0, 0.8);
        color: #fff;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status"></div>
    <div id="startWrap" class="start-wrap">
      <button id="startBtn" class="start-btn">Start AR Camera</button>
    </div>
    <div class="hint">Point your camera at the target image</div>

    <a-scene
      id="scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 0.01;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="avatarModel" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          id="debugPlane"
          position="0 0 0"
          rotation="0 0 0"
          width="1"
          height="1"
          color="#00ffff"
          opacity="0.12"
        ></a-plane>

        <a-entity id="modelAnchor" position="0 0.2 0.03" rotation="0 0 0">
          <a-box
            id="debugBox"
            position="0 -0.15 0"
            depth="0.08"
            height="0.08"
            width="0.08"
            color="#ff2d55"
          ></a-box>

          <a-entity
            id="avatar"
            gltf-model="#avatarModel"
            position="0 0 0"
            rotation="0 0 0"
            scale="1 1 1"
          ></a-entity>
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>
    </a-scene>

    <script>
      const scene = document.querySelector("#scene");
      const startBtn = document.querySelector("#startBtn");
      const startWrap = document.querySelector("#startWrap");
      const status = document.querySelector("#status");
      const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const avatar = document.querySelector("#avatar");
      const debugBox = document.querySelector("#debugBox");
      const debugPlane = document.querySelector("#debugPlane");
      const ua = navigator.userAgent || "";
      const TARGET_WIDTH = 1.0;
      const TARGET_HEIGHT = 1.0;
      const COVERAGE = 0.95;

      const showStatus = (message) => {
        status.textContent = message;
        status.style.display = "block";
      };

      const hideStatusSoon = () => {
        window.setTimeout(() => {
          status.style.display = "none";
        }, 1800);
      };

      const patchVideoForIOS = () => {
        const video = document.querySelector("video");
        if (!video) return;
        video.setAttribute("playsinline", "true");
        video.setAttribute("webkit-playsinline", "true");
        video.muted = true;
      };

      const requestCameraPermission = async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Camera API not supported in this browser.");
        }
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
          });
        } catch (firstErr) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
        stream.getTracks().forEach((track) => track.stop());
      };

      const isInAppBrowser = () => {
        return /WhatsApp|FBAN|FBAV|Instagram|Line|wv/i.test(ua);
      };

      const fitModelToTarget = () => {
        const meshRoot = avatar.getObject3D("mesh");
        if (!meshRoot || !window.THREE) return false;

        const box = new THREE.Box3().setFromObject(meshRoot);
        if (box.isEmpty()) return false;

        const size = new THREE.Vector3();
        box.getSize(size);
        if (size.x <= 0 || size.y <= 0 || size.z <= 0) return false;

        const fitScale = Math.min((TARGET_WIDTH * COVERAGE) / size.x, (TARGET_HEIGHT * COVERAGE) / size.y);
        avatar.object3D.scale.setScalar(fitScale);

        const scaledBox = new THREE.Box3().setFromObject(meshRoot);
        const center = new THREE.Vector3();
        scaledBox.getCenter(center);

        // Keep model centered on target and lift it slightly above the marker plane.
        const zLift = 0.01 - scaledBox.min.z;
        avatar.object3D.position.set(-center.x, -center.y, zLift);
        return true;
      };

      const fitModelWithRetry = (attempts = 20) => {
        let remaining = attempts;
        const run = () => {
          const ok = fitModelToTarget();
          if (ok) return;
          remaining -= 1;
          if (remaining > 0) window.requestAnimationFrame(run);
        };
        run();
      };

      const forceOpaqueMaterials = () => {
        const meshRoot = avatar.getObject3D("mesh");
        if (!meshRoot) return;
        meshRoot.traverse((node) => {
          if (!node.isMesh || !node.material) return;
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((mat) => {
            mat.transparent = false;
            mat.opacity = 1.0;
            mat.alphaTest = 0;
            mat.depthWrite = true;
            mat.needsUpdate = true;
          });
        });
      };

      startBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            showStatus("Mobile camera requires HTTPS (or localhost).");
            return;
          }
          if (isInAppBrowser()) {
            showStatus("Open this link in Safari/Chrome. In-app browsers may block camera.");
            return;
          }

          await requestCameraPermission();
          await scene.systems["mindar-image-system"].start();
          patchVideoForIOS();

          startWrap.style.display = "none";
          showStatus("Camera started. Scan the exact target image.");
          hideStatusSoon();
        } catch (err) {
          const msg = String(err && err.message ? err.message : err);
          const errName = err && err.name ? String(err.name) : "";

          if (msg.includes("Permission denied") || msg.includes("NotAllowedError")) {
            showStatus("Camera permission denied. Remove overlays, then allow camera in browser settings.");
          } else if (errName === "NotAllowedError") {
            showStatus("Camera blocked by browser. Open link in Safari/Chrome and allow camera.");
          } else if (errName === "OverconstrainedError") {
            showStatus("Camera constraint failed. Retry once, then use latest Chrome/Safari.");
          } else if (msg.includes("NotFoundError")) {
            showStatus("No camera found on this device/browser.");
          } else {
            showStatus("Camera start failed. Open in Safari/Chrome, use HTTPS, and allow camera.");
          }
          console.error(err);
        }
      });

      target.addEventListener("targetFound", () => {
        fitModelWithRetry();
        showStatus("Target found.");
        hideStatusSoon();
      });

      target.addEventListener("targetLost", () => {
        showStatus("Target lost. Keep full image in frame.");
      });

      avatar.addEventListener("model-loaded", () => {
        forceOpaqueMaterials();
        const fitted = fitModelToTarget();
        if (fitted) {
          showStatus("3D model loaded and auto-fit to image.");
          if (debugBox) debugBox.setAttribute("visible", "false");
          if (debugPlane) debugPlane.setAttribute("visible", "false");
        } else {
          fitModelWithRetry();
          showStatus("3D model loaded. Applying fit...");
        }
        hideStatusSoon();
      });

      avatar.addEventListener("model-error", () => {
        if (debugBox) debugBox.setAttribute("visible", "true");
        showStatus("Model failed to load. Check model.glb path on deployed host.");
      });
    </script>
  </body>
</html>
