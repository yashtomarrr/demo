<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEXR AR Viewer</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      .hint {
        position: fixed;
        z-index: 10;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 14px;
      }

      .brand {
        position: fixed;
        z-index: 15;
        top: 12px;
        right: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
        color: #9fe8ff;
        font-size: 12px;
        font-weight: 700;
      }

      .start-wrap {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
      }

      .start-btn {
        border: 0;
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        position: fixed;
        z-index: 25;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(180, 0, 0, 0.85);
        color: #fff;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status"></div>
    <div class="brand">Made by WEXR</div>

    <div id="startWrap" class="start-wrap">
      <button id="startBtn" class="start-btn">Start AR Camera</button>
    </div>

    <div class="hint">Point your camera at the target image</div>

    <a-scene
      id="scene"
     mindar-image="imageTargetSrc: ./targets.mind?v=6; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 8; missTolerance: 8;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="targetEntity" mindar-image-target="targetIndex: 0">
        <a-entity id="modelAnchor" position="0 0 0.02" rotation="0 0 0">
          <a-entity
            id="avatar"
            gltf-model="url(./model.glb)"
            position="0 0 0.12"
             rotation="90 180 0"
            scale="0.35 0.35 0.35"
            visible="false"
          ></a-entity>
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>
    </a-scene>

    <script>
      const scene = document.querySelector("#scene");
      const startBtn = document.querySelector("#startBtn");
      const startWrap = document.querySelector("#startWrap");
      const status = document.querySelector("#status");
      const target = document.querySelector("#targetEntity");
      const avatar = document.querySelector("#avatar");
      const ua = navigator.userAgent || "";
      const modelUrl = `./model.glb?v=${Date.now()}`;

      const showStatus = (message, timeout = 0) => {
        status.textContent = message;
        status.style.display = "block";
        if (timeout > 0) {
          window.setTimeout(() => {
            status.style.display = "none";
          }, timeout);
        }
      };

      const hideStatus = () => {
        status.style.display = "none";
      };

      const patchVideoForIOS = () => {
        const video = document.querySelector("video");
        if (!video) return;
        video.setAttribute("playsinline", "true");
        video.setAttribute("webkit-playsinline", "true");
        video.muted = true;
      };

      const requestCameraPermission = async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Camera API not supported in this browser.");
        }
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
          });
        } catch {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        }
        stream.getTracks().forEach((track) => track.stop());
      };

      const isInAppBrowser = () => /WhatsApp|FBAN|FBAV|Instagram|Line|wv/i.test(ua);

      const forceOpaqueMaterials = () => {
        const meshRoot = avatar.getObject3D("mesh");
        if (!meshRoot) return;
        meshRoot.traverse((node) => {
          if (!node.isMesh || !node.material) return;
          const materials = Array.isArray(node.material) ? node.material : [node.material];
          materials.forEach((mat) => {
            mat.transparent = false;
            mat.opacity = 1;
            mat.depthWrite = true;
            mat.depthTest = false;
            mat.alphaTest = 0;
            mat.needsUpdate = true;
          });
          node.frustumCulled = false;
        });
      };

      const applyStableModelTransform = () => {
        avatar.setAttribute("position", "0 0 0.12");
          avatar.setAttribute("rotation", "90 180 0");
        avatar.setAttribute("scale", "0.35 0.35 0.35");
        avatar.object3D.visible = true;
      };

      avatar.setAttribute("gltf-model", `url(${modelUrl})`);

      startBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            showStatus("Mobile camera requires HTTPS (or localhost).");
            return;
          }
          if (isInAppBrowser()) {
            showStatus("Open this link in Safari/Chrome. In-app browsers may block camera.");
            return;
          }

          await requestCameraPermission();
          await scene.systems["mindar-image-system"].start();
          patchVideoForIOS();

          startWrap.style.display = "none";
          showStatus("Camera started. Scan the target image.", 1400);
        } catch {
          showStatus("Camera start failed. Allow camera permission and retry.");
        }
      });

      target.addEventListener("targetFound", () => {
        avatar.setAttribute("visible", "true");
        applyStableModelTransform();
      });

      target.addEventListener("targetLost", () => {
        avatar.setAttribute("visible", "false");
      });

      avatar.addEventListener("model-loaded", () => {
        forceOpaqueMaterials();
        applyStableModelTransform();
        hideStatus();
      });

      avatar.addEventListener("model-error", () => {
        avatar.setAttribute("visible", "false");
        showStatus("Model failed to load. Verify /model.glb is accessible.");
      });
    </script>
  </body>
</html>
