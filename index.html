<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEXR Interactive AR Business Card</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: #000;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
      }

      .start-btn {
        border: 0;
        border-radius: 12px;
        padding: 14px 22px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background: #00bcd4;
        color: #04131a;
      }

      .brand {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 25;
        color: #9fe8ff;
        background: rgba(0, 0, 0, 0.45);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .hint {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        z-index: 25;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
      }

      .status {
        position: fixed;
        left: 50%;
        top: 14px;
        transform: translateX(-50%);
        z-index: 25;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="brand">Made by WEXR</div>
    <div id="status" class="status"></div>
    <div id="hint" class="hint">Point camera at the business card target</div>

    <div id="startWrap" class="overlay">
      <button id="startBtn" class="start-btn">Start AR Business Card</button>
    </div>

    <a-scene
      id="scene"
      mindar-image="imageTargetSrc: ./targets.mind?v=7; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 8; missTolerance: 8;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="introVideo"
          src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="rayOrigin: mouse; fuse: false"
        raycaster="objects: .clickable"
      ></a-camera>

      <a-entity id="cardTarget" mindar-image-target="targetIndex: 0">
        <a-plane position="0 0 0" width="1.05" height="0.62" color="#0b1a22" opacity="0.92"></a-plane>

        <a-text
          value="WEXR IMMERSIVE PVT. LTD"
          color="#9fe8ff"
          align="center"
          width="1.6"
          position="0 0.26 0.01"
        ></a-text>

        <a-text
          value="Interactive AR Business Card"
          color="#d7f8ff"
          align="center"
          width="1.5"
          position="0 0.21 0.01"
        ></a-text>

        <a-plane
          id="videoPanel"
          position="-0.24 0.02 0.02"
          width="0.48"
          height="0.28"
          material="shader: flat; src: #introVideo"
        ></a-plane>

        <a-plane position="0.25 0.1 0.02" width="0.46" height="0.15" color="#113041" opacity="0.95"></a-plane>
        <a-text
          value="We build AR/VR experiences\nfor marketing, training, and products."
          color="#ffffff"
          align="left"
          width="0.85"
          position="0.04 0.11 0.03"
        ></a-text>

        <a-plane position="0.25 -0.06 0.02" width="0.46" height="0.14" color="#12444c" opacity="0.95"></a-plane>
        <a-text
          value="Tap buttons below to:\nOpen website, LinkedIn, email, call"
          color="#ffffff"
          align="left"
          width="0.85"
          position="0.04 -0.06 0.03"
        ></a-text>

        <a-entity id="buttons" position="0 -0.23 0.03">
          <a-plane class="clickable" position="-0.33 0 0" width="0.17" height="0.08" color="#00bcd4" link-button="url: https://www.linkedin.com; label: LinkedIn"></a-plane>
          <a-text value="LinkedIn" align="center" color="#04131a" width="0.5" position="-0.33 0 0.01"></a-text>

          <a-plane class="clickable" position="-0.11 0 0" width="0.17" height="0.08" color="#64dd17" link-button="url: https://wexr.in; label: Website"></a-plane>
          <a-text value="Website" align="center" color="#052100" width="0.5" position="-0.11 0 0.01"></a-text>

          <a-plane class="clickable" position="0.11 0 0" width="0.17" height="0.08" color="#ffca28" link-button="url: mailto:hello@wexr.in; label: Email"></a-plane>
          <a-text value="Email" align="center" color="#2a1c00" width="0.5" position="0.11 0 0.01"></a-text>

          <a-plane class="clickable" position="0.33 0 0" width="0.17" height="0.08" color="#ff7043" link-button="url: tel:+919999999999; label: Call"></a-plane>
          <a-text value="Call" align="center" color="#3a1206" width="0.5" position="0.33 0 0.01"></a-text>
        </a-entity>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="0.7" position="0 1 1"></a-light>
    </a-scene>

    <script>
      AFRAME.registerComponent("link-button", {
        schema: {
          url: { type: "string" },
          label: { type: "string", default: "Link" }
        },
        init: function () {
          const el = this.el;
          const data = this.data;
          const open = () => {
            if (!data.url) return;
            window.location.href = data.url;
          };
          el.addEventListener("click", open);
          el.addEventListener("touchstart", open);
        }
      });

      const scene = document.querySelector("#scene");
      const startBtn = document.querySelector("#startBtn");
      const startWrap = document.querySelector("#startWrap");
      const status = document.querySelector("#status");
      const hint = document.querySelector("#hint");
      const target = document.querySelector("#cardTarget");
      const introVideo = document.querySelector("#introVideo");

      const showStatus = (message, timeout = 1200) => {
        status.textContent = message;
        status.style.display = "block";
        if (timeout > 0) {
          window.setTimeout(() => {
            status.style.display = "none";
          }, timeout);
        }
      };

      const requestCameraPermission = async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Camera API not supported.");
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
        stream.getTracks().forEach((t) => t.stop());
      };

      const waitForCameraFeed = async (timeoutMs = 4000) => {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          const videos = Array.from(document.querySelectorAll("video"));
          const cameraVideo = videos.find((v) => v.id !== "introVideo" && v.srcObject);
          const hasActiveTrack =
            cameraVideo &&
            cameraVideo.srcObject &&
            cameraVideo.srcObject.getVideoTracks &&
            cameraVideo.srcObject.getVideoTracks().some((t) => t.readyState === "live");
          if (
            cameraVideo &&
            hasActiveTrack &&
            cameraVideo.readyState >= 2 &&
            cameraVideo.videoWidth > 0 &&
            cameraVideo.videoHeight > 0
          ) {
            return true;
          }
          await new Promise((resolve) => setTimeout(resolve, 100));
        }
        return false;
      };

      startBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            showStatus("Use HTTPS for mobile camera access.", 1800);
            return;
          }
          await requestCameraPermission();
          await scene.systems["mindar-image-system"].start();
          const feedOk = await waitForCameraFeed();
          if (!feedOk) {
            showStatus("Camera feed blocked. Allow camera, close other camera apps, then retry.", 3500);
            return;
          }
          startWrap.style.display = "none";
          showStatus("AR started. Scan the target card.");
        } catch (err) {
          const name = err && err.name ? err.name : "UnknownError";
          if (name === "NotAllowedError") {
            showStatus("Camera denied. Allow camera in browser site settings.", 3000);
          } else if (name === "NotReadableError") {
            showStatus("Camera busy in another app. Close Zoom/Meet/Snapchat and retry.", 3500);
          } else if (name === "NotFoundError") {
            showStatus("No camera device found.", 2500);
          } else {
            showStatus(`Camera start failed: ${name}`, 3000);
          }
        }
      });

      scene.addEventListener("arError", () => {
        showStatus("AR engine error. Check targets.mind and camera permission.", 3500);
      });

      scene.addEventListener("arReady", () => {
        showStatus("AR engine ready.", 1200);
      });

      target.addEventListener("targetFound", async () => {
        hint.textContent = "Target detected. Tap buttons to interact.";
        try {
          await introVideo.play();
        } catch {
          // Ignore autoplay errors on strict browsers.
        }
      });

      target.addEventListener("targetLost", () => {
        hint.textContent = "Point camera at the business card target";
        introVideo.pause();
      });
    </script>
  </body>
</html>
