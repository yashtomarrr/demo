<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindAR Image Tracking</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: sans-serif;
      }

      .hint {
        position: fixed;
        z-index: 10;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 14px;
      }

      .start-wrap {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
      }

      .start-btn {
        border: 0;
        border-radius: 12px;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        position: fixed;
        z-index: 30;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(180, 0, 0, 0.8);
        color: #fff;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status"></div>
    <div id="startWrap" class="start-wrap">
      <button id="startBtn" class="start-btn">Start AR Camera</button>
    </div>
    <div class="hint">Point your camera at the target image</div>

    <a-scene
      id="scene"
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="avatarModel" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity
          gltf-model="#avatarModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="0.2 0.2 0.2"
          animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
        ></a-entity>
      </a-entity>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" intensity="0.8" position="0 1 1"></a-light>
    </a-scene>

    <script>
      const scene = document.querySelector("#scene");
      const startBtn = document.querySelector("#startBtn");
      const startWrap = document.querySelector("#startWrap");
      const status = document.querySelector("#status");
      const ua = navigator.userAgent || "";

      const showStatus = (message) => {
        status.textContent = message;
        status.style.display = "block";
      };

      const patchVideoForIOS = () => {
        const video = document.querySelector("video");
        if (!video) return;
        video.setAttribute("playsinline", "true");
        video.setAttribute("webkit-playsinline", "true");
        video.muted = true;
      };

      const getFacingModeConstraints = () => ({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });

      const requestCameraPermission = async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("Camera API not supported in this browser.");
        }
        const stream = await navigator.mediaDevices.getUserMedia(getFacingModeConstraints());
        stream.getTracks().forEach((track) => track.stop());
      };

      const isInAppBrowser = () => {
        return /WhatsApp|FBAN|FBAV|Instagram|Line|wv/i.test(ua);
      };

      startBtn.addEventListener("click", async () => {
        try {
          if (!window.isSecureContext) {
            showStatus("Mobile camera requires HTTPS (or localhost).");
            return;
          }
          if (isInAppBrowser()) {
            showStatus("Open this link in Safari/Chrome. In-app browsers may block camera.");
            return;
          }
          await requestCameraPermission();
          await scene.systems["mindar-image-system"].start();
          patchVideoForIOS();
          startWrap.style.display = "none";
        } catch (err) {
          const msg = String(err && err.message ? err.message : err);
          const errName = err && err.name ? String(err.name) : "";
          if (msg.includes("Permission denied") || msg.includes("NotAllowedError")) {
            showStatus("Camera permission denied. Remove Android overlays/popups, then allow camera.");
          } else if (errName === "NotAllowedError") {
            showStatus("Camera blocked by browser. Open link in Safari/Chrome and allow camera.");
          } else if (msg.includes("NotFoundError")) {
            showStatus("No camera found on this device/browser.");
          } else {
            showStatus("Camera start failed. Open in Safari/Chrome, use HTTPS, and allow camera.");
          }
          console.error(err);
        }
      });
    </script>
  </body>
</html>
